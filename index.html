<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMK Teknologi Indonesia | Website Profil</title>
    <meta name="description" content="Website Profil SMK Teknologi Indonesia - Demo Deployment CI/CD">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">SMK TI</div>
            <h1>SMK Teknologi Indonesia</h1>
            <p class="subtitle">Membangun Masa Depan Digital</p>
            <div class="badge">CI/CD Pipeline Active</div>
        </header>
        
        <main>
            <section class="hero">
                <h2>Selamat Datang</h2>
                <div class="status-card">
                    <div class="pulse"></div>
                    <p>Website berhasil di-deploy secara online melalui GitHub Actions & Netlify.</p>
                </div>
                <button id="mainButton" onclick="pesan()">
                    <span>Konfirmasi Deployment</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </button>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2024 SMK Teknologi Indonesia. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
